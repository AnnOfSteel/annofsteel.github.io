<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
<style>
  /* The Twinkle Animation */
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Apply to all stars (usually circles or paths in Illustrator) */
  circle, path {
    animation: twinkle 4s infinite ease-in-out;
  }

  /* Offset the timing so they don't all blink at the exact same time */
  circle:nth-child(even), path:nth-child(even) {
    animation-duration: 3s;
    animation-delay: 1.5s;
  }
  
  circle:nth-child(3n), path:nth-child(3n) {
    animation-duration: 5.5s;
    animation-delay: 0.5s;
  }
.a{fill:#fff}
</style>





